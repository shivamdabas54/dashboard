<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Glass Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
body {
    background: radial-gradient(circle at 20% 20%, #0a0a0a, #050505);
    font-family: 'Inter', sans-serif;
}

/* Glass Card */
.glass {
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    box-shadow: 0 0 30px rgba(168,85,247,0.08);
    transition: all 0.3s ease;
}

.glass:hover {
    transform: translateY(-4px) scale(1.01);
    box-shadow: 0 0 40px rgba(34,211,238,0.15);
}

/* Neon Border Glow */
.glow-border {
    position: relative;
}

.glow-border::before {
    content: "";
    position: absolute;
    inset: -1px;
    border-radius: 16px;
    background: linear-gradient(120deg,#A855F7,#22D3EE);
    z-index: -1;
    opacity: 0.3;
    filter: blur(6px);
}

.sidebar-btn:hover {
    background: rgba(255,255,255,0.05);
}
</style>
</head>

<body class="flex h-screen text-white">

<!-- SIDEBAR -->
<div class="w-20 flex flex-col items-center py-6 gap-6 glass m-4">
    <i data-lucide="layout-dashboard"></i>
    <i data-lucide="users"></i>
    <i data-lucide="calendar"></i>
    <i data-lucide="settings"></i>
</div>

<!-- MAIN -->
<div class="flex-1 p-6 overflow-auto">

<!-- HEADER -->
<div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-semibold">Dashboard</h1>

    <div class="glass px-4 py-2 flex items-center gap-2">
        <i data-lucide="search"></i>
        <input placeholder="Search..." class="bg-transparent outline-none text-sm">
    </div>
</div>

<!-- GRID -->
<div class="grid grid-cols-4 gap-6">

<!-- CARD 1 -->
<div class="glass glow-border p-4 col-span-1">
    <h2 class="text-sm text-gray-400">Team Online</h2>
    <p class="text-2xl mt-2 text-cyan-400">12</p>
</div>

<!-- CARD 2 -->
<div class="glass glow-border p-4 col-span-1">
    <h2 class="text-sm text-gray-400">Active Tasks</h2>
    <p class="text-2xl mt-2 text-purple-400">28</p>
</div>

<!-- CARD 3 -->
<div class="glass glow-border p-4 col-span-2">
    <h2 class="text-sm text-gray-400 mb-3">Activity</h2>

    <div class="h-24 flex items-end gap-2">
        <div class="bg-purple-500 w-2 h-10"></div>
        <div class="bg-cyan-400 w-2 h-16"></div>
        <div class="bg-purple-500 w-2 h-6"></div>
        <div class="bg-cyan-400 w-2 h-20"></div>
        <div class="bg-purple-500 w-2 h-12"></div>
    </div>
</div>

<!-- TASK BOARD -->
<div class="glass glow-border p-4 col-span-2">
    <h2 class="mb-3 text-gray-400">Tasks</h2>

    <div class="space-y-2">
        <div class="glass p-2 text-sm">Fix DB issue</div>
        <div class="glass p-2 text-sm">Deploy backend</div>
        <div class="glass p-2 text-sm">UI polish</div>
    </div>
</div>

<!-- TEAM -->
<div class="glass glow-border p-4 col-span-2">
    <h2 class="mb-3 text-gray-400">Team</h2>

    <div class="flex gap-4">
        <div class="text-center">
            <div class="w-12 h-12 rounded-full bg-purple-500"></div>
            <p class="text-xs mt-1">Shivam</p>
        </div>
        <div class="text-center">
            <div class="w-12 h-12 rounded-full bg-cyan-400"></div>
            <p class="text-xs mt-1">Harsh</p>
        </div>
    </div>
</div>

</div>
</div>

<script>
lucide.createIcons();
</script>

</body>
</html>
